<!doctype html>
<html>
  <head>
    <title>PrintGo</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        margin: 0;
        padding: 28px;
        font-family: "Segoe UI", Arial, sans-serif;

        background: linear-gradient(135deg, #e9f0ff, #fef6ff);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 1100px;
        display: grid;
        grid-template-columns: 1fr 1.4fr 1fr;
        gap: 20px;
        align-items: stretch;
        position: relative;
      }

      #timeout-warning {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        color: rgb(255, 255, 255);
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
        position: fixed;
        inset: 0;
        background: rgba(255, 50, 50, 0.723);
        backdrop-filter: blur(2px);
        pointer-events: none;
        z-index: 10;
        display: none;
      }
      #flag-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3fb86b;
        box-shadow: 0 0 0 4px rgba(63, 184, 107, 0.2);
        animation: activeDotPulse 1.6s ease-in-out infinite;
      }

      #color-flag-dot {
        position: fixed;
        top: 16px;
        right: 20px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(52, 83, 114, 0.18);
        border-radius: 999px;
        backdrop-filter: blur(4px);
        z-index: 13;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #state {
        color: #264057;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }

      @keyframes activeDotPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.8);
          opacity: 0.8;
        }
      }

      /* --- glass cards --- */
      .card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }

      /* LEFT — USER GUIDE */
      .info-box h2 {
        margin: 0 0 10px;
        color: #333;
        font-size: 20px;
      }

      .info-box li {
        margin: 8px 0;
        color: #555;
        font-size: 14px;
      }

      /* CENTER */
      .center-box {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      #upper-text {
        top: 20px;
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: #39516f;
        z-index: 13;
      }

      #kioskID {
        margin: 0 0 8px;
        color: #6a6a6a;
        font-size: 14px;
        letter-spacing: 0.6px;
      }

      #resetButton {
        border: none;
        background: #1f7cff;
        color: white;
        padding: 8px 16px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.25s all ease;
      }

      #resetButton:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(0, 119, 255, 0.25);
      }

      #qr {
        margin-top: 14px;
        border-radius: 16px;
        padding: 18px;
        background: white;
        box-shadow: inset 0 0 0 1px #e5e5e5;
      }

      #imagetoshow {
        margin-top: 12px;
        border-radius: 14px;
        object-fit: cover;
        display: none;
      }

      #status {
        font-size: 18px;
        margin-top: 16px;
        color: #333;
        animation: pulse 1.6s infinite;
        z-index: 13;
      }

      @keyframes pulse {
        0% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.6;
        }
      }

      /* RIGHT — ADS */
      .ads-box h2 {
        margin: 0 0 10px;
        color: #333;
      }

      .ad-placeholder {
        width: 100%;
        height: 180px;
        background: linear-gradient(135deg, #e7ecff, #ffe9fb);
        border-radius: 14px;
        margin: 10px 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #555;
        font-weight: 600;
        font-size: 14px;
      }

      /* RESPONSIVE */
      @media (max-width: 950px) {
        .container {
          grid-template-columns: 1fr;
        }

        #color-flag-dot {
          top: 10px;
          right: 12px;
          padding: 7px 10px;
        }
      }
    </style>
  </head>

  <body>
    <div id="timeout-warning">
      <h1>WARNING</h1>
      <h2 id="timeout-message">Status</h2>
    </div>
    <div id="color-flag-dot">
      <span id="flag-dot"></span><span id="state">connected</span>
    </div>
    <div class="container">
      <!-- LEFT -->
      <div class="card info-box">
        <h2>User Guide</h2>
        <ul>
          <li>Scan the QR code in the center</li>
          <li>Upload your documents</li>
          <li>Select print preferences</li>
          <li>Pay securely</li>
          <li>Collect your prints instantly</li>
        </ul>
        <button id="resetButton">RESET</button>
      </div>

      <!-- CENTER -->
      <div class="card center-box">
        <!-- <p id="kioskID">URL</p> -->
        <h2 id="upper-text">PrintGo Kiosk</h2>

        <canvas id="qr"></canvas>

        <img id="imagetoshow" height="260" />

        <h1 id="status">Loading…</h1>
      </div>

      <!-- RIGHT -->
      <div class="card ads-box">
        <h2>Sponsored Ads</h2>

        <div class="ad-placeholder">Ad Space 1</div>
        <div class="ad-placeholder">Ad Space 2</div>
      </div>
    </div>

    <script defer src="../renderer/renderer.js"></script>
  </body>
</html>
