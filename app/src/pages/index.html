<!DOCTYPE html>
<html>
<head>
  <title>PrintGo</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      margin: 0;
      padding: 28px;
      font-family: "Segoe UI", Arial, sans-serif;

      background: linear-gradient(135deg, #e9f0ff, #fef6ff);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      gap: 20px;
      align-items: stretch;
    }

    /* --- glass cards --- */
    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.6);
    }

    /* LEFT — USER GUIDE */
    .info-box h2 {
      margin: 0 0 10px;
      color: #333;
      font-size: 20px;
    }

    .info-box li {
      margin: 8px 0;
      color: #555;
      font-size: 14px;
    }

    /* CENTER */
    .center-box {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #kioskID {
      margin: 0 0 8px;
      color: #6a6a6a;
      font-size: 14px;
      letter-spacing: 0.6px;
    }

    #resetButton {
      border: none;
      background: #1f7cff;
      color: white;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.25s all ease;
    }

    #resetButton:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(0, 119, 255, 0.25);
    }

    #qr {
      margin-top: 14px;
      border-radius: 16px;
      padding: 18px;
      background: white;
      box-shadow: inset 0 0 0 1px #e5e5e5;
    }

    #imagetoshow {
      margin-top: 12px;
      border-radius: 14px;
      object-fit: cover;
      display: none;
    }

    #status {
      font-size: 18px;
      margin-top: 16px;
      color: #333;
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% { opacity: .6; }
      50% { opacity: 1; }
      100% { opacity: .6; }
    }

    /* RIGHT — ADS */
    .ads-box h2 {
      margin: 0 0 10px;
      color: #333;
    }

    .ad-placeholder {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #e7ecff, #ffe9fb);
      border-radius: 14px;
      margin: 10px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }

    /* RESPONSIVE */
    @media (max-width: 950px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT -->
    <div class="card info-box">
      <h2>User Guide</h2>
      <ul>
        <li>Scan the QR code in the center</li>
        <li>Upload your documents</li>
        <li>Select print preferences</li>
        <li>Pay securely</li>
        <li>Collect your prints instantly</li>
      </ul>
    </div>

    <!-- CENTER -->
    <div class="card center-box">
      <p id="kioskID">URL</p>

      <button id="resetButton">RESET</button>

      <canvas id="qr"></canvas>

      <img id="imagetoshow" height="260" />

      <h1 id="status">Loading…</h1>
    </div>

    <!-- RIGHT -->
    <div class="card ads-box">
      <h2>Sponsored Ads</h2>

      <div class="ad-placeholder">Ad Space 1</div>
      <div class="ad-placeholder">Ad Space 2</div>
    </div>

  </div>

  <script defer src="../renderer/renderer.js"></script>
</body>
</html>
